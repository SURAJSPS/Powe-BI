# Base palette; RNK dark/light is applied in ui/theme/layout.py via --st-* bridge + inject_theme.
[theme]
base = "light"
primaryColor = "#7c3aed"
backgroundColor = "#f8fafc"
secondaryBackgroundColor = "#ffffff"
textColor = "#18181b"
font = "sans serif"
showWidgetBorder = true

[browser]
gatherUsageStats = false
